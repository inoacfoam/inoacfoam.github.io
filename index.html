<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INOAC Warranty</title>
  <link rel="stylesheet" href="Document_files/style.css" />
</head>

<body>
  <div id="page" class="page">
    <section class="hero" id="heroArea">
      <img
        class="ball"
        src="Document_files/group0.svg"
        alt="Warranty Visual"
        onerror="this.style.display='none'; document.getElementById('heroArea').classList.add('no-ball');"
      />

      <img
        class="bed"
        src="Document_files/whats-app-image-2025-02-04-at-14-46-29-5-df-5389-d-10.png"
        alt="Kasur INOAC"
        onerror="this.style.display='none';"
      />

      <div class="hero-text">
        <div class="small">Kuat, Tahan Lama</div>
        <div class="bold">dan Bergaransi</div>
      </div>
    </section>

    <section class="main-card">
      <div id="successIcon" class="success-icon">✓</div>

      <div id="titleText" class="title">SELAMAT</div>

      <div id="subtitleText" class="subtitle">
        Anda telah membeli produk asli
      </div>

      <div class="brand-row">
        <span>dari INOAC</span>
        <span class="inoac-logo-box">
          <img
            src="Document_files/logo-inoac-df.png"
            alt="Logo INOAC"
            onerror="this.style.display='none';"
          />
        </span>
      </div>

      <div class="producer-text">
        diproduksi oleh INOAC dan distribusi oleh
      </div>

      <div class="company-name">
        PT. INOAC POLYTECHNO INDONESIA
      </div>
    </section>

    <section class="warranty-box">
      <div id="warrantyTitle" class="warranty-title">
        Garansi Produk Ini Adalah
      </div>

     <div class="date-row">
  <div id="warrantyDay" class="date-item">--</div>
  <div id="warrantyMonth" class="date-item">--</div>
  <div id="warrantyYear" class="date-item">----</div>
</div>
    </section>

    <form id="warrantyForm" class="form-section">
      <input type="hidden" id="serialCode" name="serialCode" value="1KCRXT" />
      <input type="hidden" id="keyRegistrationCode" name="keyRegistrationCode" value="1KPI7L" />
      <input type="hidden" id="registrationCode" name="registrationCode" value="" />
      <input type="hidden" id="productCode" name="productCode" value="BSA-0065-000270" />
      <input type="hidden" id="productName" name="productName" value="INOAC D-20 EOQ BLACK" />
      <input type="hidden" id="warrantyDate" name="warrantyDate" value="2026-05-16" />

      <div class="field">
        <label>Serial Number <span class="required">*</span></label>
        <input type="text" value="1KCRXT" disabled />
      </div>

      <div class="field">
        <label>Product ID <span class="required">*</span></label>
        <input type="text" value="BSA-0065-000270" disabled />
      </div>

      <div class="field">
        <label>Garansi (Tahun) <span class="required">*</span></label>
        <input type="text" value="10" disabled />
      </div>

      <div class="field">
        <label for="customerName">Nama Lengkap <span class="required">*</span></label>
        <input type="text" id="customerName" name="customerName" maxlength="50" required />
      </div>

      <div class="field">
        <label for="gender">Jenis Kelamin <span class="required">*</span></label>
        <select id="gender" name="gender" required>
          <option value="Laki-laki" selected>Laki-laki</option>
          <option value="Perempuan">Perempuan</option>
        </select>
      </div>

      <div class="field">
        <label for="placeOfBirth">Tempat Lahir <span class="required">*</span></label>
        <input type="text" id="placeOfBirth" name="placeOfBirth" maxlength="50" required />
      </div>

      <div class="field">
        <label for="dateOfBirth">Tanggal Lahir <span class="required">*</span></label>
        <input type="date" id="dateOfBirth" name="dateOfBirth" required />
      </div>

      <div class="field">
        <label for="telephone">Nomor Telepon <span class="required">*</span></label>
        <input type="tel" id="telephone" name="telephone" maxlength="15" inputmode="numeric" required />
      </div>

      <div class="field">
        <label for="email">Email <span class="required">*</span></label>
        <input type="email" id="email" name="email" maxlength="50" required />
      </div>

      <div class="field">
        <label for="address">Alamat</label>
        <input type="text" id="address" name="address" maxlength="100" />
      </div>

      <div class="submit-wrap">
        <div class="submit-inner">
          <button type="button" id="submitBtn" class="submit">SUBMIT</button>
        </div>
      </div>
    </form>
  </div>

  <script>
    function showSuccessModal() {
  const modal = document.getElementById("successModal");
  if (modal) {
    modal.classList.add("show");
  }
}

function closeSuccessModal() {
  const modal = document.getElementById("successModal");
  if (modal) {
    modal.classList.remove("show");
  }
}
  (function () {
    const WARRANTY_YEARS = 10 ;

    const dateInput = document.getElementById("dateOfBirth");
    const submitBtn = document.getElementById("submitBtn");

    function pad2(value) {
      return String(value).padStart(2, "0");
    }

    function addYears(date, years) {
      const result = new Date(date);
      result.setFullYear(result.getFullYear() + years);
      return result;
    }

    function formatDateForInput(date) {
      return (
        date.getFullYear() +
        "-" +
        pad2(date.getMonth() + 1) +
        "-" +
        pad2(date.getDate())
      );
    }

    function setWarrantyDisplay(date) {
      document.getElementById("warrantyDay").innerText = pad2(date.getDate());
      document.getElementById("warrantyMonth").innerText = pad2(date.getMonth() + 1);
      document.getElementById("warrantyYear").innerText = date.getFullYear();

      const warrantyDateInput = document.getElementById("warrantyDate");
      if (warrantyDateInput) {
        warrantyDateInput.value = formatDateForInput(date);
      }
    }

    function refreshWarrantyPreview() {
      const today = new Date();
      const warrantyEndDate = addYears(today, WARRANTY_YEARS);
      setWarrantyDisplay(warrantyEndDate);
    }

    if (dateInput) {
      const today = new Date();
      const formattedToday = formatDateForInput(today);
      dateInput.value = formattedToday;
      dateInput.max = formattedToday;
    }

    refreshWarrantyPreview();

    submitBtn.addEventListener("click", function () {
      const form = document.getElementById("warrantyForm");

      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }

      const submitDate = new Date();
      const warrantyEndDate = addYears(submitDate, WARRANTY_YEARS);
      setWarrantyDisplay(warrantyEndDate);

      document.getElementById("successIcon").style.display = "block";
      document.getElementById("titleText").innerText = "SELAMAT";
      document.getElementById("subtitleText").innerHTML =
        '<strong style="font-size:24px;color:#000;">Anda Berhasil Registrasi</strong>';
      document.getElementById("warrantyTitle").innerText =
        "Masa Berlaku Garansi Produk";

      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
showSuccessModal();
    });
  })();
</script>
</body>
  <div id="successModal" class="custom-modal">
  <div class="custom-modal-box">
    <div class="modal-icon">✓</div>
    <h2>Registrasi Berhasil</h2>
    <p>Selamat, data garansi produk Anda berhasil dikirim.</p>
    <button type="button" onclick="closeSuccessModal()">Oke</button>
  </div>
</div>
</html>
